<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serein — Your personal setup assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F2EDE4;
    --cream-dark: #E8E0D0;
    --green: #6B8F71;
    --green-dark: #3D5A42;
    --green-light: #A8C4AC;
    --text: #2C2C2C;
    --text-muted: #7A7A6E;
    --white: #FDFCF9;
    --border: #D8D0C0;
  }

  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); overflow: hidden; }

  .app { display: flex; flex-direction: column; height: 100vh; }

  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; letter-spacing: -0.5px; }
  .logo span:first-child { color: var(--green); font-style: italic; }
  .logo span:last-child { color: var(--green-dark); }
  .header-sub { font-size: 1.05rem; color: var(--text-muted); font-weight: 300; }

  .progress-bar-wrap {
    background: var(--cream-dark);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .progress-label { font-size: 1rem; color: var(--text-muted); white-space: nowrap; min-width: 120px; }
  .progress-track { flex: 1; height: 6px; background: var(--cream); border-radius: 99px; overflow: hidden; border: 1px solid var(--border); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green-light), var(--green)); border-radius: 99px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
  .progress-pct { font-size: 0.85rem; color: var(--green); font-weight: 500; min-width: 36px; text-align: right; }

  .chat-area {
    flex: 1; overflow-y: auto; padding: 36px 40px;
    display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .msg { max-width: 640px; animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .msg.assistant { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .msg-bubble {
    padding: 16px 22px; border-radius: 18px;
    font-size: 1.05rem; line-height: 1.65;
  }
  .msg.assistant .msg-bubble {
    background: var(--white); border: 1px solid var(--border);
    border-bottom-left-radius: 4px; color: var(--text);
  }
  .msg.user .msg-bubble { background: var(--green); color: #fff; border-bottom-right-radius: 4px; }
  .msg-name { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .msg.user .msg-name { text-align: right; color: var(--green); }

  .chip-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; animation: fadeUp 0.5s 0.15s ease both; }
  .chip {
    padding: 8px 18px; border-radius: 99px; border: 1.5px solid var(--green-light);
    background: transparent; color: var(--green-dark); font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; cursor: pointer; transition: all 0.2s;
  }
  .chip:hover { background: var(--green); color: #fff; border-color: var(--green); transform: translateY(-1px); }
  .chip:disabled { opacity: 0.4; cursor: default; transform: none; }

  .input-area {
    background: var(--white); border-top: 1px solid var(--border);
    padding: 20px 40px; display: flex; gap: 14px; align-items: center; flex-shrink: 0;
  }
  textarea {
    flex: 1; border: 1.5px solid var(--border); border-radius: 14px;
    padding: 14px 20px; font-family: 'DM Sans', sans-serif; font-size: 1.05rem;
    color: var(--text); background: var(--cream); resize: none; outline: none;
    transition: border-color 0.2s; line-height: 1.5; min-height: 54px; max-height: 120px;
  }
  textarea::placeholder { color: var(--text-muted); }
  textarea:focus { border-color: var(--green-light); background: var(--white); }
  textarea:disabled { opacity: 0.6; cursor: not-allowed; }

  .send-btn {
    width: 54px; height: 54px; border-radius: 14px; border: none;
    background: var(--green); color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s, transform 0.15s;
  }
  .send-btn:hover:not(:disabled) { background: var(--green-dark); transform: scale(1.04); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .send-btn svg { width: 20px; height: 20px; }

  .typing { display: flex; align-items: center; gap: 5px; padding: 14px 20px; background: var(--white); border: 1px solid var(--border); border-radius: 18px; border-bottom-left-radius: 4px; width: fit-content; }
  .dot { width: 7px; height: 7px; background: var(--green-light); border-radius: 50%; animation: bounce 1.2s infinite ease; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.5} 40%{transform:translateY(-6px);opacity:1} }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><span>Sere</span><span>in</span></div>
    <div class="header-sub">Your personal setup assistant</div>
  </header>
  <div class="progress-bar-wrap">
    <div class="progress-label" id="progressLabel">Getting started</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area">
    <textarea id="inputBox" rows="1" placeholder="Type your answer here, or tap one of the options above…"></textarea>
    <button class="send-btn" id="sendBtn">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are Serein, a warm and gentle personal setup assistant. Your purpose is to learn about the user's lifestyle, habits, goals, and preferences through natural conversation, so you can help them build a calm daily rhythm.

Personality:
- Warm, unhurried, thoughtful — like a knowledgeable friend, not a productivity coach
- Use simple, beautiful language. Short paragraphs. Never bullet lists.
- Occasionally use a single nature-inspired emoji (🌿 🌱 🍃 ✨ 🌙 ☀️) — sparingly
- Never be prescriptive or pushy. Everything is an invitation, not a demand.

Conversation goals (work through these naturally, not rigidly):
1. Understand what brings them here (stress, wanting structure, new habits, curiosity)
2. Learn about their mornings and evenings
3. Discover their core priorities and values
4. Understand how much structure feels comfortable
5. Agree on how Serein should check in with them
6. Warmly close the setup and invite them to their dashboard

Rules:
- Ask ONE question at a time. Never stack multiple questions.
- Keep responses to 2–4 sentences max.
- After ~5–6 exchanges, naturally wrap up and tell them their profile is ready.
- At the very end of the final message, add this exact marker on its own line: [SETUP_COMPLETE]

JSON response format — ALWAYS respond with valid JSON only, no markdown fences:
{
  "message": "Your warm response here",
  "chips": ["Option A", "Option B", "Option C"],
  "progress": 25,
  "progressLabel": "Your mornings"
}

chips: 2–4 short suggestion chips relevant to your question. Keep them under 5 words each.
progress: a number 0–100 reflecting how far through setup you are.
progressLabel: a short 2–3 word label for the current phase.`;

const conversationHistory = [];
let isLoading = false;

const chatArea = document.getElementById('chatArea');
const inputBox = document.getElementById('inputBox');
const sendBtn = document.getElementById('sendBtn');

function setLoading(val) {
  isLoading = val;
  inputBox.disabled = val;
  sendBtn.disabled = val;
}

function updateProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  if (label) document.getElementById('progressLabel').textContent = label;
}

function addUserMessage(text) {
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `<div class="msg-name">You</div><div class="msg-bubble">${escHtml(text)}</div>`;
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addAssistantMessage(text, chips = []) {
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = escHtml(text);
  msg.innerHTML = `<div class="msg-name">Serein</div>`;
  msg.appendChild(bubble);

  if (chips.length) {
    const row = document.createElement('div');
    row.className = 'chip-row';
    chips.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = label;
      btn.onclick = () => {
        if (isLoading) return;
        row.querySelectorAll('.chip').forEach(c => c.disabled = true);
        handleUserInput(label);
      };
      row.appendChild(btn);
    });
    msg.appendChild(row);
  }

  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTypingIndicator() {
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  wrap.id = 'typingWrap';
  wrap.innerHTML = `<div class="msg-name">Serein</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chatArea.appendChild(wrap);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTypingIndicator() {
  const t = document.getElementById('typingWrap');
  if (t) t.remove();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

async function askClaude(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });
  setLoading(true);
  showTypingIndicator();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const raw = data.content?.[0]?.text || '{}';

    let parsed;
    try {
      parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    } catch {
      parsed = { message: raw, chips: [], progress: null, progressLabel: null };
    }

    conversationHistory.push({ role: 'assistant', content: raw });
    removeTypingIndicator();

    const isComplete = parsed.message?.includes('[SETUP_COMPLETE]');
    const cleanMsg = parsed.message?.replace('[SETUP_COMPLETE]', '').trim() || '';

    if (parsed.progress !== undefined && parsed.progress !== null) {
      updateProgress(parsed.progress, parsed.progressLabel);
    }

    addAssistantMessage(cleanMsg, isComplete ? [] : (parsed.chips || []));

    if (isComplete) {
      updateProgress(100, 'All done ✨');
      inputBox.placeholder = 'Your setup is complete 🌿';
      setLoading(true);
    } else {
      setLoading(false);
    }

  } catch (err) {
    removeTypingIndicator();
    addAssistantMessage('Something went gently wrong on my end. Could you try again? 🌿', []);
    console.error(err);
    setLoading(false);
  }
}

function handleUserInput(text) {
  if (!text.trim() || isLoading) return;
  addUserMessage(text);
  inputBox.value = '';
  inputBox.style.height = 'auto';
  askClaude(text);
}

sendBtn.addEventListener('click', () => handleUserInput(inputBox.value.trim()));
inputBox.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleUserInput(inputBox.value.trim()); }
});
inputBox.addEventListener('input', () => {
  inputBox.style.height = 'auto';
  inputBox.style.height = Math.min(inputBox.scrollHeight, 120) + 'px';
});

updateProgress(0, 'Getting started');
setTimeout(() => askClaude('Hello, I just opened the app for the first time.'), 300);
</script>
</body>
</html>
